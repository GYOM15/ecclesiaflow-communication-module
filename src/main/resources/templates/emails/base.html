<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, subtitle)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject ?: 'EcclesiaFlow'}">EcclesiaFlow</title>
    <!--
    ============================================================================
    EcclesiaFlow Email Template - Design System
    ============================================================================
    Brand Colors (Logo-based):
    - Primary:    #1B2A41 (deep blue - faith, trust)
    - Success:    #3CB371 (soft green - life, growth)
    - Background: #F8FAFC (neutral light)
    - Text:       #1F2326 (anthracite)
    - Accent:     #FF5C7A (coral - minimal use for warnings)
    
    Typography: Manrope, Inter, system fonts
    Design: Human-centric with rounded corners
    ============================================================================
    -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #F8FAFC;
            color: #1F2326;
        }
        .email-container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(27, 42, 65, 0.10);
            padding: 20px;
        }
        .email-header {
            background-color: #F8FAFC;
            padding: 18px 30px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .email-header img.logo {
            max-width: 300px;
            height: auto;
        }
        .email-title {
            text-align: center;
            padding: 24px 30px 0 30px;
        }
        .email-title p {
            margin: 8px 0;
            font-size: 24px;
            font-weight: 400;
            color: #64748b;
            padding: 5px 0;
        }
        .email-body {
            padding: 40px 30px;
            color: #1F2326;
            line-height: 1.7;
            font-size: 15px;
        }
        .email-footer {
            background-color: #F8FAFC;
            border-top: 1px solid #e2e8f0;
            padding: 24px 30px;
            text-align: center;
            color: #64748b;
            font-size: 12px;
        }
        .email-footer p {
            margin: 4px 0;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            margin: 24px 0;
            background-color: #3CB371;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .btn-primary {
            background-color: #1B2A41;
        }
        .btn-warning {
            background-color: #FF5C7A;
        }
        .divider {
            height: 1px;
            background-color: #e2e8f0;
            margin: 24px 0;
        }
        .highlight {
            color: #3CB371;
            font-weight: 600;
        }
        .info-box {
            background-color: #f0f9ff;
            border-left: 4px solid #1B2A41;
            padding: 16px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }
        .greeting {
            padding: 24px 0;
        }
        .email-footer .copyright {
            padding-top: 10px;
        }
        .success-box {
            background-color: #f0fdf4;
            border-left: 4px solid #3CB371;
            padding: 16px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }
        .warning-box {
            background-color: #fff5f7;
            border-left: 4px solid #FF5C7A;
            padding: 16px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin: 8px 0;
        }
        a {
            color: #3CB371;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <img th:if="${logoUrl}" th:src="${logoUrl}" alt="EcclesiaFlow" class="logo">
            <span th:unless="${logoUrl}" style="font-size: 20px; font-weight: 700; color: #1B2A41;">EcclesiaFlow</span>
        </div>
        <div class="email-title" th:if="${subtitle}">
            <p th:text="${subtitle}">Subtitle</p>
        </div>
        <div class="email-body" th:replace="${content}">
            <!-- Content will be replaced by specific templates -->
        </div>
        <div class="email-footer">
            <p>EcclesiaFlow - Community Management Platform</p>
            <p>This email was sent automatically, please do not reply.</p>
            <p class="copyright">© <span th:text="${#temporals.year(#temporals.createNow())}"></span> EcclesiaFlow. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
