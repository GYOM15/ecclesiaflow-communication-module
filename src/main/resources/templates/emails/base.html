<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, subtitle, accentColor)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title th:text="${subject ?: 'EcclesiaFlow'}">EcclesiaFlow</title>
    <!--
    ============================================================================
    EcclesiaFlow Email Template — v2 Bold & Branded
    ============================================================================
    Brand Colors:
    - Sapphire:  #3B52F6 (primary)
    - Gold:      #F59E0B / #D97706 (accent)
    - Teal:      #14B8A6 (secondary)
    - Error:     #EF4444
    Typography: Inter, system fonts
    ============================================================================
    -->
    <style>
        body { margin: 0; padding: 0; background-color: #f1f5f9; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        img { border: 0; display: block; }
        a { color: #3B52F6; }
    </style>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;">
    <!-- Wrapper table -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9;">
    <tr><td align="center" style="padding:32px 16px;">

        <!-- Email container (600px) -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

            <!-- ========== HEADER ========== -->
            <tr>
                <td style="background:linear-gradient(135deg,#0A0E1A 0%,#131B2E 100%);padding:0;">
                    <!-- Rainbow accent strip -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                        <tr>
                            <td style="height:3px;background:linear-gradient(90deg,#3B52F6,#14B8A6,#F59E0B,#EF4444,#3B52F6);"></td>
                        </tr>
                    </table>
                    <!-- Logo area -->
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                        <tr>
                            <td align="center" style="padding:28px 32px 24px;">
                                <span style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:24px;font-weight:800;color:#ffffff;letter-spacing:-0.02em;">Ecclesia<span style="color:#6078FA;">Flow</span></span>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>

            <!-- ========== CARD ACCENT STRIP ========== -->
            <tr>
                <td th:style="'height:4px;background:' + (${accentColor} ?: '#3B52F6') + ';'" style="height:4px;background:#3B52F6;"></td>
            </tr>

            <!-- ========== SUBTITLE (optional) ========== -->
            <tr th:if="${subtitle}">
                <td align="center" style="padding:28px 40px 0;">
                    <span th:text="${subtitle}" style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:20px;font-weight:300;color:#64748b;">Sous-titre</span>
                </td>
            </tr>

            <!-- ========== CONTENT ========== -->
            <tr>
                <td style="padding:32px 40px;" th:replace="${content}">
                    <!-- Remplacé par les templates enfants -->
                </td>
            </tr>

            <!-- ========== FOOTER ========== -->
            <tr>
                <td style="background:#0A0E1A;padding:0;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                        <tr>
                            <td align="center" style="padding:28px 32px 8px;">
                                <span style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:16px;font-weight:800;color:#ffffff;letter-spacing:-0.02em;">Ecclesia<span style="color:#6078FA;">Flow</span></span>
                            </td>
                        </tr>
                        <tr>
                            <td align="center" style="padding:0 32px;">
                                <span style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;">Plateforme de gestion d'&#233;glise</span>
                            </td>
                        </tr>
                        <tr>
                            <td align="center" style="padding:16px 32px 0;">
                                <table role="presentation" cellpadding="0" cellspacing="0">
                                    <tr>
                                        <td style="padding:0 8px;"><a href="#" style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:12px;color:rgba(255,255,255,0.4);text-decoration:none;">Centre d'aide</a></td>
                                        <td style="color:rgba(255,255,255,0.15);font-size:12px;">|</td>
                                        <td style="padding:0 8px;"><a href="#" style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:12px;color:rgba(255,255,255,0.4);text-decoration:none;">Confidentialit&#233;</a></td>
                                        <td style="color:rgba(255,255,255,0.15);font-size:12px;">|</td>
                                        <td style="padding:0 8px;"><a href="#" style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:12px;color:rgba(255,255,255,0.4);text-decoration:none;">Se d&#233;sabonner</a></td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                        <tr>
                            <td align="center" style="padding:16px 32px 24px;">
                                <span style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.25);">&copy; <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> EcclesiaFlow. Tous droits r&#233;serv&#233;s.</span>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>

        </table>

        <!-- Auto-message note -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
            <tr>
                <td align="center" style="padding:16px 0;">
                    <span style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:11px;color:#94a3b8;">Ceci est un message automatique. Merci de ne pas r&#233;pondre.</span>
                </td>
            </tr>
        </table>

    </td></tr>
    </table>
</body>
</html>
