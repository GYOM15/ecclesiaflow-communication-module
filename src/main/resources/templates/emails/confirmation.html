<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{emails/base :: layout(~{::content}, 'Verify your email', '#3B52F6')}">
<body>
    <th:block th:fragment="content">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
            <!-- Icon -->
            <tr>
                <td align="center" style="padding-bottom:20px;">
                    <table role="presentation" cellpadding="0" cellspacing="0">
                        <tr>
                            <td style="width:56px;height:56px;border-radius:50%;background:rgba(59,82,246,0.1);text-align:center;vertical-align:middle;font-size:24px;">&#10003;</td>
                        </tr>
                    </table>
                </td>
            </tr>
            <!-- Greeting -->
            <tr>
                <td style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:15px;color:#334155;line-height:1.6;padding-bottom:16px;">
                    Hello <strong th:text="${firstName ?: 'there'}">Member</strong>,
                </td>
            </tr>
            <!-- Body -->
            <tr>
                <td style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:15px;color:#334155;line-height:1.6;padding-bottom:24px;">
                    Welcome to <strong>EcclesiaFlow</strong>! Please confirm your email address to activate your account.
                </td>
            </tr>
            <!-- CTA Button -->
            <tr>
                <td align="center" style="padding-bottom:24px;">
                    <a th:href="${confirmationLink ?: '#'}" style="display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#3B52F6,#5469F7);color:#ffffff;text-decoration:none;border-radius:12px;font-family:'Inter',Helvetica,Arial,sans-serif;font-size:14px;font-weight:600;box-shadow:0 4px 12px rgba(59,82,246,0.3);">
                        Verify my email
                    </a>
                </td>
            </tr>
            <!-- Info box -->
            <tr>
                <td style="padding-bottom:24px;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                        <tr>
                            <td style="background:#f8fafc;border-radius:8px;padding:14px 16px;border-left:3px solid #3B52F6;">
                                <span style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:13px;color:#64748b;line-height:1.5;">This link is valid for <strong>24 hours</strong>. After this period, you will need to request a new confirmation.</span>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <!-- Hint -->
            <tr>
                <td style="font-family:'Inter',Helvetica,Arial,sans-serif;font-size:13px;color:#94a3b8;line-height:1.5;padding-bottom:8px;">
                    If you didn't create an EcclesiaFlow account, you can safely ignore this email.
                </td>
            </tr>
        </table>
    </th:block>
</body>
</html>
