# ============================================================================
# EcclesiaFlow Email Module - Application Configuration
# ============================================================================

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
server.port=8082
spring.application.name=ecclesiaflow-communication-module

# ============================================================================
# DATABASE CONFIGURATION (MySQL)
# ============================================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:8889}/${DB_NAME:email_module_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================================
# MAIL CONFIGURATION (Gmail SMTP)
# ============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
ecclesiaflow.mail.from=${MAIL_FROM}
ecclesiaflow.app.name=EcclesiaFlow

# ============================================================================
# RABBITMQ CONFIGURATION
# ============================================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# RabbitMQ Queue Names (can be prefixed for different environments)
rabbitmq.exchange.email=${RABBITMQ_EXCHANGE_EMAIL:ecclesiaflow.email.exchange}
rabbitmq.queue.email.send=${RABBITMQ_QUEUE_EMAIL_SEND:ecclesiaflow.email.send.queue}
rabbitmq.queue.email.retry=${RABBITMQ_QUEUE_EMAIL_RETRY:ecclesiaflow.email.retry.queue}
rabbitmq.queue.email.dlq=${RABBITMQ_QUEUE_EMAIL_DLQ:ecclesiaflow.email.dlq}
rabbitmq.routing-key.email.send=${RABBITMQ_ROUTING_KEY_EMAIL_SEND:email.send.*}
rabbitmq.routing-key.email.retry=${RABBITMQ_ROUTING_KEY_EMAIL_RETRY:email.retry.*}

# ============================================================================
# gRPC CONFIGURATION
# ============================================================================
grpc.enabled=true
grpc.server.port=9092
grpc.server.shutdown-timeout-seconds=30

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging.level.com.ecclesiaflow.communication=DEBUG
logging.level.com.ecclesiaflow.communication.business.services=DEBUG
logging.level.com.ecclesiaflow.communication.io.grpc=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.root=INFO

# ============================================================================
# OPENAPI DOCUMENTATION
# ============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
springdoc.paths-to-match=/ecclesiaflow/**

# ============================================================================
# ACTUATOR & METRICS
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# ============================================================================
# EMAIL QUEUE PROCESSING
# ============================================================================
email.queue.processor.enabled=true
email.queue.batch-size=10
email.queue.retry-max-attempts=3

# ============================================================================
# EMAIL BRANDING
# ============================================================================
# Logo URL for communication templates (use a publicly accessible URL)
ecclesiaflow.email.logo-url=${EMAIL_LOGO_URL:}

# ============================================================================
# EMAIL PROVIDERS
# ============================================================================
# SendGrid Configuration (Optional - Backup provider)
sendgrid.enabled=${SENDGRID_ENABLED:false}
sendgrid.api.key=${SENDGRID_API_KEY:}

# RabbitMQ Configuration
rabbitmq.enabled=${RABBITMQ_ENABLED:false}
