# ============================================================================
# Test Configuration
# ============================================================================

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable RabbitMQ for tests
rabbitmq.enabled=false

# Disable gRPC for tests
grpc.enabled=false

# Disable communication queue processor for tests
email.queue.processor.enabled=false

# Mail configuration (mocked in tests)
spring.mail.host=localhost
spring.mail.port=3025
ecclesiaflow.mail.from=test@ecclesiaflow.com
